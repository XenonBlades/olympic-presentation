<!DOCTYPE html>
<html lang="ja"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<meta charset="utf-8">
<title>表紙</title>
<link rel="stylesheet" href="conclusion_data/shared.css">
<style id="slide-selected-style">
  [data-slide-selected]::before
  /* [data-slide-hover-selected]::before */ {
    content: '';
    position: absolute;
    top: -4px;
    left: -4px;
    width: 100%;
    height: 100%;
    box-sizing: content-box;
    padding: 4px;
    border-radius: 0px;
    outline: 2px solid #0f7fff !important;
    z-index: 10000;
    pointer-events: none;
  }

 /* [data-slide-hover-selected], */
  [data-slide-selected] {
    position: relative;
    outline: none;
    cursor: default;
  }

  img[data-slide-selected],
  img[data-slide-hover-selected],
  [data-slide-hover-selected],
  [item-slide-click-selected],
  [item-slide-selected] {
    border: 2px solid #0f7fff !important;
  }


</style></head>
<body>
<div class="slide-container" data-screen-label="01 表紙" style="position:relative; width:1920px; height:1080px; overflow:hidden; background:#0d1a3a;">

  <!-- 左側の市松模様パネル -->
  <div data-object="true" data-object-type="shape" class="ichimatsu-bg" style="position:absolute; left:0; top:0; width:720px; height:1080px; z-index:1; background-color:#0d1a3a;"></div>

  <!-- 中央の白いオーバーレイ -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:640px; top:0; width:1280px; height:1080px; background:#f4f1e8; z-index:2;"></div>

  <!-- 縦の細い金線 -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:720px; top:0; width:4px; height:1080px; background:#b8975a; z-index:3;"></div>

  <!-- 縦書き風 副題 -->
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:790px; top:120px; width:80px; height:840px; z-index:10; writing-mode:vertical-rl; font-family:'Noto Serif JP', serif; font-size:28px; letter-spacing:0.5em; color:#1a2f5c; font-weight:500;">
    言葉を超える、日本のデザイン
  </div>

  <!-- タイトル(大) -->
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:920px; top:170px; width:920px; height:430px; z-index:10;">
    <div style="font-family:'Noto Serif JP', serif; font-size:120px; font-weight:900; color:#0d1a3a; line-height:1.05; letter-spacing:-0.02em;">
      東京<br>オリンピック<span style="color:#bc002d;">の</span><br>デザイン
    </div>
  </div>

  <!-- 英語サブタイトル -->
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:920px; top:730px; width:900px; height:60px; z-index:10;">
    <div style="font-family:'Noto Serif JP', serif; font-size:28px; color:#b8975a; letter-spacing:0.15em; font-weight:500;">
      DESIGN of the TOKYO OLYMPICS
    </div>
  </div>

  <!-- 装飾線 -->
  <div data-object="true" data-object-type="shape" style="position:absolute; left:920px; top:810px; width:80px; height:4px; background:#0d1a3a; z-index:5;"></div>

  <!-- リード文 -->
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:920px; top:840px; width:920px; height:110px; z-index:10;">
    <div style="font-family:'Noto Sans JP', sans-serif; font-size:26px; font-weight:400; color:#1a2f5c; line-height:1.7;">
      〜 エンブレムとピクトグラムに隠された<br>
      &nbsp;&nbsp;&nbsp;スキャンダル・伝統・世界を変えた発明 〜
    </div>
  </div>

  <!-- フッタ発表者情報 -->
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:920px; top:990px; width:920px; height:40px; z-index:10;">
    <div style="font-family:'Noto Sans JP', sans-serif; font-size:20px; color:#6b6b6b; letter-spacing:0.1em;">
      日本語プレゼンテーション　|　約13分
    </div>
  </div>

  <!-- 左上装飾五輪 -->
  <div data-object="true" data-object-type="textbox" style="position:absolute; left:60px; top:60px; width:340px; height:60px; z-index:10;">
    <div style="font-family:'Noto Serif JP', serif; font-size:22px; color:#f4f1e8; letter-spacing:0.3em; font-weight:500;">
      TOKYO 2020　◉　TOKYO 1964
    </div>
  </div>

</div>
